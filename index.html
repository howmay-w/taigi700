<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="zh-tw" lang="zh-tw">
<head>
<title>教育部700建議用字練習</title>
<meta charset="utf-8">
<meta name="theme-color" content="#111844">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Iansui&family=Huninn&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: NunitoPOJ;
  src: url(NunitoPOJ-Regular.ttf) format('truetype');
}

/* ── 色彩 tokens ──────────────────────────────────────────
   品牌原色
   --navy   #111844  深底色、文字
   --blue   #4B5694  主要強調、active 狀態
   --slate  #7288AE  次要、灰階文字
   --beige  #EAE0CF  頁面背景
   --amber  #FAB95B  星星、暖色高亮
   --stone  #E8E2DB  卡片表面、邊框
   ──────────────────────────────────────────────────────── */
:root {
  --navy:  #111844;
  --blue:  #4B5694;
  --slate: #7288AE;
  --beige: #EAE0CF;
  --amber: #FAB95B;
  --stone: #E8E2DB;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

html { background: var(--navy) }

body {
  background: var(--beige);
  font-family: 'Huninn', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
}

/* ── Header ─────────────────────────────────────────── */
#header {
  background: var(--navy);
  padding: 12px 12px 10px;
  padding-top: calc(12px + env(safe-area-inset-top));
  flex-shrink: 0;
}

#mode-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.mode-tab {
  flex: 1;
  font-family: 'Huninn', sans-serif;
  font-size: 14px;
  padding: 9px 2px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: var(--slate);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.mode-tab.active { background: var(--blue); color: #fff }

#mode-toggles {
  display: flex;
  gap: 8px;
}
.tgl-group {
  flex: 1;
  position: relative;
  display: flex;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 3px;
  overflow: hidden;
}
.tgl {
  flex: 1;
  position: relative;
  z-index: 1;
  font-family: 'Huninn', sans-serif;
  font-size: 14px;
  padding: 6px 0;
  border: none;
  background: transparent;
  color: var(--slate);
  cursor: pointer;
  transition: color 0.25s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.tgl.active { color: #fff }
.tgl-indicator {
  position: absolute;
  top: 3px; bottom: 3px; left: 3px;
  width: calc(50% - 3px);
  border-radius: 17px;
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}
#pool-toggle   .tgl-indicator { background: var(--blue) }
#answer-toggle .tgl-indicator { background: var(--slate) }
.tgl-group.right .tgl-indicator { transform: translateX(100%) }

/* ── Main ────────────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 0;
  overflow-y: auto;
}

#card {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-radius: 18px;
  padding: 20px 20px 24px;
  box-shadow: 0 2px 16px rgba(17,24,68,0.10);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

#no {
  font-size: 13px;
  color: var(--slate);
  align-self: flex-start;
}

#word {
  font-family: 'Iansui', sans-serif;
  font-size: 64px;
  color: var(--navy);
  line-height: 1.2;
  text-align: center;
  border-radius: 12px;
  padding: 4px 16px;
  min-width: 160px;
  margin-bottom: -8px;
}

#read {
  font-family: NunitoPOJ, 'Iansui', sans-serif;
  color: var(--blue);
  text-align: center;
  border-radius: 12px;
  padding: 4px 16px;
  min-width: 160px;
  min-height: 60px;
}
#read1 { font-family: NunitoPOJ, sans-serif; font-size: 44px; line-height: 1.3 }
#read1 span { display: block }
#read2 { font-family: NunitoPOJ, sans-serif; font-size: 22px; color: var(--slate); margin-top: 2px; min-height: calc(22px * 1.4) }
#read2 span { white-space: nowrap }

.play-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  background: var(--slate);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  cursor: pointer;
  font-family: 'Huninn', sans-serif;
  font-size: 14px;
  opacity: 0.85;
  transition: opacity 0.12s, background 0.12s;
}
.play-btn:hover { opacity: 1; background: var(--blue) }
.play-btn svg { flex-shrink: 0 }

#mean {
  font-family: 'Huninn', sans-serif;
  font-size: 22px;
  line-height: 1.5;
  color: var(--navy);
  text-align: center;
  border-radius: 12px;
  padding: 4px 16px;
  min-width: 120px;
  min-height: 44px;
}
#mean span { white-space: nowrap }

.masked {
  color: transparent !important;
  background: var(--stone) !important;
  border-radius: 12px;
  user-select: none;
  pointer-events: none;
}
.masked * { color: transparent !important }
#read.masked { color: transparent !important }

#hint-area { width: 100%; min-height: 52px; }
#hint {
  font-family: 'Iansui', sans-serif;
  font-size: 22px;
  color: var(--navy);
  line-height: 2.4;
  text-align: center;
}
.hint-item { display: inline-block; white-space: nowrap; }
.hint-sep { display: inline; white-space: normal; margin: 0 1px; }
.blank { color: var(--slate) }
.hint-word { color: var(--blue); font-family: 'Iansui', sans-serif }
.hint-play {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--slate);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px 8px;
  cursor: pointer;
  font-size: 12px;
  vertical-align: text-top;
  margin-left: 5px;
  line-height: 1;
  opacity: 0.85;
}
.hint-play:hover { opacity: 1 }

#listen-area {
  width: 100%;
  max-width: 480px;
  margin-top: 8px;
}
#listen-card {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-radius: 18px;
  padding: 20px 20px 16px;
  box-shadow: 0 2px 16px rgba(17,24,68,0.10);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
#listen-input {
  font-family: 'Iansui', sans-serif;
  font-size: 22px;
  width: 90%;
  padding: 8px 4px;
  border: none;
  border-bottom: 2px solid var(--slate);
  border-radius: 0;
  text-align: center;
  background: transparent;
  outline: none;
}
#listen-input:focus { border-bottom-color: var(--blue) }
#listen-input:disabled { color: var(--slate) }
#listen-result { font-size: 20px; font-weight: bold; margin-top: 6px; }
.result-correct { color: #8EB486 }
.result-wrong   { color: #FF6060 }

/* ── 底部操作列 ───────────────────────────────────────── */
#bottom-bar {
  position: sticky;
  bottom: 0;
  left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--stone);
  display: flex;
  align-items: center;
  padding: 12px 12px calc(28px + env(safe-area-inset-bottom));
  gap: 8px;
  flex-shrink: 0;
  margin-top: 16px;
}
#bottom-bar > button { height: 48px; }

#back {
  font-family: 'Huninn', sans-serif;
  font-size: 18px;
  background: var(--stone);
  border: none;
  border-radius: 10px;
  padding: 11px 14px;
  cursor: pointer;
  color: var(--navy);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
#back:hover { background: var(--beige) }

#star {
  background: var(--stone);
  border: none;
  border-radius: 10px;
  padding: 11px 14px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
#star:hover { background: var(--beige) }
#star .star-icon { fill: var(--slate); transition: fill 0.2s }
#star.starred { background: #fdf3e0 }
#star.starred .star-icon { fill: var(--amber) }

#show {
  flex: 1;
  font-family: 'Huninn', sans-serif;
  font-size: 20px;
  padding: 11px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
#show:hover { background: var(--navy) }
#show:disabled { background: var(--stone); color: var(--slate); cursor: default; }

#next {
  flex: 1;
  font-family: 'Huninn', sans-serif;
  font-size: 20px;
  padding: 11px;
  background: var(--navy);
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
#next:hover { background: #060c22 }

.toast {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(17,24,68,0.88);
  color: #fff;
  font-family: 'Huninn', sans-serif;
  font-size: 15px;
  padding: 9px 20px;
  border-radius: 22px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) }

.hide { display: none !important }

@media (max-height: 700px) {
  #header { padding: 8px 12px 8px; padding-top: calc(8px + env(safe-area-inset-top)); }
  #mode-tabs { margin-bottom: 6px; }
  .mode-tab { padding: 7px 2px; font-size: 13px; }
  .tgl { padding: 4px 0; font-size: 13px; }
  #main { padding: 12px 16px 0; }
  #card { padding: 14px 16px 16px; gap: 10px; }
  #word { font-size: 48px; }
  #read { min-height: 44px; }
  #read1 { font-size: 34px; }
  #read2 { font-size: 18px; min-height: calc(18px * 1.4); }
  #mean { font-size: 18px; min-height: 36px; }
  #hint { font-size: 18px; line-height: 2; }
  #hint-area { min-height: 40px; }
  #listen-area { margin-top: 6px; }
  #listen-card { padding: 14px 16px 12px; }
  #listen-input { font-size: 19px; }
  #bottom-bar { padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
  #bottom-bar > button { height: 42px; }
}
</style>
</head>
<body>

<div id="header">
  <div id="mode-tabs">
    <button class="mode-tab active" data-mode="word">漢字</button>
    <button class="mode-tab" data-mode="read">台羅</button>
    <button class="mode-tab" data-mode="mean">華語解釋</button>
  </div>
  <div id="mode-toggles">
    <div class="tgl-group" id="pool-toggle">
      <button class="tgl active" id="toggle-all">全部</button>
      <button class="tgl" id="toggle-star">生份<svg viewBox="0 0 24 24" width="12" height="12" style="fill:#bbb;flex-shrink:0"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></button>
      <div class="tgl-indicator"></div>
    </div>
    <div class="tgl-group" id="answer-toggle">
      <button class="tgl active" id="toggle-show">顯示</button>
      <button class="tgl" id="toggle-type">拍字</button>
      <div class="tgl-indicator"></div>
    </div>
  </div>
</div>

<div id="main">
  <div id="card">
    <span id="no"></span>
    <span id="word"></span>
    <div id="read">
      <div id="read1"></div>
      <div id="read2"></div>
    </div>
    <button id="play-word-btn" class="play-btn">
      <svg viewBox="0 0 10 13" width="10" height="13" fill="currentColor">
        <polygon points="0,0 10,6.5 0,13"/>
      </svg>
      播音
    </button>
    <span id="empty-kaomoji" class="hide" style="font-size:28px;color:#c0b0ab;letter-spacing:2px">(* ´ㅁ`*)</span>
    <div id="mean"></div>
    <div id="hint-area">
      <div id="hint"></div>
    </div>
  </div>

  <div id="listen-area" class="hide">
    <div id="listen-card">
      <input id="listen-input" type="text" autocomplete="off" autocorrect="off"
             autocapitalize="none" spellcheck="false" placeholder="輸入答案…">
      <div id="listen-result"></div>
    </div>
  </div>
</div>

<div id="bottom-bar">
  <button id="back"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
  <button id="star">
    <svg class="star-icon" viewBox="0 0 24 24" width="22" height="22">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
  </button>
  <button id="show">對答案</button>
  <button id="next" class="hide">後一條</button>
</div>

<audio id="player"></audio>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="moe700.js"></script>
<script>

var ques = null;
var qi = null;
var mode = 'word';
var answerMode = 'show';
var onlyStarred = false;
var currentQ = null;

var qindex = {};
for (var i in moe700) qindex[moe700[i].no + ''] = i;

var player = document.getElementById('player');

function playAudio(src) {
  player.src = src;
  player.play().catch(function() {});
}

function wordAudioSrc(q) {
  return 'audio/minnan700-' + q.no + '-' + q.word + '.mp3';
}

function sampleAudioSrc(q, rawItem) {
  var wordBase = q.word.replace(/\(.*?\)/g, '');
  return 'audio/minnan700-' + q.no + '-' + rawItem.replace(/～/g, wordBase) + '.mp3';
}

// 聲調符號 → 數字對應表
var TONE_DIA = {
  '́': 2, // á  acute
  '̀': 3, // à  grave
  '̂': 5, // â  circumflex
  '̌': 6, // ǎ  caron
  '̄': 7, // ā  macron
  '̍': 8, // a̍  vertical line above（第八調，U+030D）
  '̋': 9, // a̋  double acute
};

// 將單一音節（允許含聲調符號或尾數字）轉為 base+數字 形式
// 例：bô → bo5  kah → kah4  tsang9 → tsang9  a → a1
function syllableToNumbered(syl) {
  syl = syl.trim().toLowerCase();
  if (!syl) return '';

  // 已經有數字調號（字母後接單一數字）
  var numMatch = syl.match(/^([a-zÀ-ɏ]+)([1-9])$/i);
  if (numMatch) {
    // 去掉字母部分的聲調符號（使用者可能混用）
    var base = numMatch[1].normalize('NFD').replace(/[̀-ͯ]/g, '');
    return base + numMatch[2];
  }

  // 含聲調符號 → 掃描 NFD 找 combining char
  var nfd = syl.normalize('NFD');
  var tone = 0;
  var base = '';
  for (var i = 0; i < nfd.length; i++) {
    var t = TONE_DIA[nfd[i]];
    if (t !== undefined) {
      tone = t;
    } else {
      base += nfd[i];
    }
  }
  // 無聲調符號：結尾 p/t/k/h 為第四調，否則第一調
  if (tone === 0) tone = /[ptkh]$/.test(base) ? 4 : 1;
  return base + tone;
}

// 將完整讀音字串（含 - 分隔）轉為 numbered form 陣列
function readToNumbered(str) {
  return str.trim().split(/[\s-]+/).map(syllableToNumbered);
}

function optionalVariants(str) {
  // "小可(仔)" → ["小可", "小可仔"]
  // "sió-khuá(-á)" → ["sió-khuá", "sió-khuá-á"]
  var base = str.replace(/\(.*?\)/g, '').replace(/[-\s]+$/, '').replace(/[-\s]{2,}/g, '-').trim();
  var full = str.replace(/[()]/g, '').trim();
  return base === full ? [base] : [base, full];
}

function checkAnswer(q, input) {
  if (mode === 'word') {
    var inp = input.trim();
    var variants = optionalVariants(q.word);
    return variants.indexOf(inp) !== -1;
  }

  // 台羅模式：必須調號正確（符號或數字皆可）
  // 多音節必須有空格或 - 分隔
  var inputParts = input.trim().split(/[\s-]+/).map(syllableToNumbered);
  var inputKey = inputParts.join('-');

  var reads = (q.read || []).concat(q.read2 || []);
  for (var i = 0; i < reads.length; i++) {
    var variants = optionalVariants(reads[i]);
    for (var v = 0; v < variants.length; v++) {
      var readParts = readToNumbered(variants[v]);
      if (readParts.join('-') === inputKey) return true;
    }
  }
  return false;
}

function playSvg() {
  return '<svg viewBox="0 0 10 13" width="9" height="11" fill="currentColor"><polygon points="0,0 10,6.5 0,13"/></svg>';
}

function toHintSpans(q) {
  var parts = q.sample.split(/、/);
  var res = '';
  for (var i = 0; i < parts.length; i++) {
    var src = sampleAudioSrc(q, parts[i]);
    var display = parts[i].replace(/～/g, '<span class="blank">＿</span>');
    res += '<span class="hint-item">'
         + '<span class="hint-text">' + display + '</span>'
         + '<button class="hint-play" data-src="' + src + '">' + playSvg() + '</button>'
         + '</span>'
         + (i < parts.length - 1 ? '<span class="hint-sep">、</span>' : '');
  }
  return res;
}

function revealHintWord(q) {
  $('#hint .blank').each(function() {
    $(this).replaceWith('<span class="hint-word">' + q.word + '</span>');
  });
}

function showToast(msg) {
  var $t = $('<div class="toast">' + msg + '</div>');
  $('body').append($t);
  setTimeout(function() { $t.addClass('show'); }, 10);
  setTimeout(function() { $t.removeClass('show'); }, 1000);
  setTimeout(function() { $t.remove(); }, 1400);
}

function applyMask() {
  $('#word, #read, #mean').removeClass('masked');
  if (mode === 'word') $('#word').addClass('masked');
  if (mode === 'read') $('#read').addClass('masked');
  if (mode === 'mean') $('#mean').addClass('masked');
}

function removeMasks() {
  $('#word, #read, #mean').removeClass('masked');
}

function startMode() {
  ques = [];
  if (onlyStarred) {
    var marklist = getMarks();
    if (!marklist || marklist.length === 0) { showEmpty(); return; }
    for (var i in marklist) ques.push(moe700[qindex[marklist[i]]]);
  } else {
    for (var i in moe700) ques.push(moe700[i]);
  }
  for (var i = 0; i < ques.length; i++) {
    var j = Math.floor(Math.random() * ques.length);
    if (i === j) continue;
    var tmp = ques[i]; ques[i] = ques[j]; ques[j] = tmp;
  }
  qi = 0;
  nextQuestion();
}

function showEmpty() {
  $('#no').text('');
  $('#word').text('').removeClass('masked');
  $('#read1').html('Bô mi̍h-kiānn');
  $('#read2').html('');
  $('#read').removeClass('masked');
  $('#mean').html('<span>若拄著記袂牢的詞，</span><br><span>會使揤 <svg viewBox="0 0 24 24" width="20" height="20" style="vertical-align:-3px;fill:var(--slate)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> 共加入來。</span>').removeClass('masked');
  $('#hint').html('');
  $('#play-word-btn').addClass('hide');
  $('#empty-kaomoji').removeClass('hide');
  $('#listen-area').addClass('hide');
  $('#show').addClass('hide');
  $('#next').addClass('hide');
  $('#back').addClass('hide');
  $('#star').addClass('hide');
  $('#bottom-bar').addClass('hide');
  currentQ = null;
}

function nextQuestion() {
  if (qi >= ques.length) { startMode(); return; }
  var q = ques[qi];
  currentQ = q;
  $('#bottom-bar').removeClass('hide');
  $('#play-word-btn').removeClass('hide');
  $('#empty-kaomoji').addClass('hide');
  $('#star').removeClass('hide');

  var reads1 = '';
  for (var r in q.read) reads1 += '<span>' + q.read[r] + '</span>';
  var reads2 = '';
  if (q.read2) for (var r in q.read2) reads2 += (r == 0 ? '' : ' / ') + '<span>' + q.read2[r] + '</span>';

  $('#no').text('No. ' + q.no);
  $('#word').text(q.word);
  $('#read1').html(reads1);
  $('#read2').html(reads2);
  $('#mean').html(q.mean.split(/、/).map(function(s){ return '<span>' + s + '</span>'; }).join('、'));
  $('#hint').html(toHintSpans(q));

  applyMask();

  var isType = (answerMode === 'type') && (mode !== 'mean');
  if (isType) {
    var ph = mode === 'word' ? '輸入漢字' : '輸入台羅';
    $('#listen-input').attr('placeholder', ph).val('').prop('disabled', false);
    $('#listen-result').html('');
    $('#listen-area').removeClass('hide');
    $('#show').text('確認答案').prop('disabled', true);
    setTimeout(function() { playAudio(wordAudioSrc(q)); }, 200);
  } else {
    $('#listen-area').addClass('hide');
    $('#show').text('對答案').prop('disabled', false);
  }

  $('#star').removeClass('starred');
  if (isMarked(q.no)) $('#star').addClass('starred');

  $('#show').removeClass('hide');
  $('#next').addClass('hide');
  if (qi >= 1) $('#back').removeClass('hide'); else $('#back').addClass('hide');

  qi++;
}

function revealAnswer() {
  removeMasks();
  $('#show').addClass('hide');
  $('#next').removeClass('hide');
  if (currentQ) revealHintWord(currentQ);
  if ((answerMode === 'type') && (mode !== 'mean')) {
    $('#listen-input').prop('disabled', true);
    $('#show').prop('disabled', false); // reset for next question
  }
}

$('.mode-tab').click(function() {
  var newMode = $(this).data('mode');
  if (newMode === mode) return;
  $('.mode-tab').removeClass('active');
  $(this).addClass('active');
  mode = newMode;
  if (mode === 'mean') {
    $('#answer-toggle').addClass('hide');
    answerMode = 'show';
    $('#toggle-show').addClass('active');
    $('#toggle-type').removeClass('active');
    $('#answer-toggle').removeClass('right');
  } else {
    $('#answer-toggle').removeClass('hide');
  }
  if (!currentQ) { startMode(); return; }
  applyMask();
  refreshAnswerMode();
});

$('#toggle-all').click(function() {
  if (!onlyStarred) return;
  onlyStarred = false;
  $('#toggle-all').addClass('active');
  $('#toggle-star').removeClass('active');
  $('#pool-toggle').removeClass('right');
  startMode();
});

$('#toggle-star').click(function() {
  if (onlyStarred) return;
  onlyStarred = true;
  $('#toggle-star').addClass('active');
  $('#toggle-all').removeClass('active');
  $('#pool-toggle').addClass('right');
  startMode();
});

function refreshAnswerMode() {
  if (!currentQ) { startMode(); return; }
  var isType = (answerMode === 'type') && (mode !== 'mean');
  if (isType) {
    var ph = mode === 'word' ? '輸入漢字' : '輸入台羅';
    $('#listen-input').attr('placeholder', ph).val('').prop('disabled', false);
    $('#listen-result').html('');
    $('#listen-area').removeClass('hide');
    $('#show').text('確認答案').prop('disabled', true).removeClass('hide');
    $('#next').addClass('hide');
    applyMask();
    setTimeout(function() { playAudio(wordAudioSrc(currentQ)); }, 200);
  } else {
    $('#listen-area').addClass('hide');
    $('#show').text('對答案').prop('disabled', false).removeClass('hide');
    $('#next').addClass('hide');
  }
}

$('#toggle-show').click(function() {
  if (answerMode === 'show') return;
  answerMode = 'show';
  $('#toggle-show').addClass('active');
  $('#toggle-type').removeClass('active');
  $('#answer-toggle').removeClass('right');
  refreshAnswerMode();
});

$('#toggle-type').click(function() {
  if (answerMode === 'type') return;
  answerMode = 'type';
  $('#toggle-type').addClass('active');
  $('#toggle-show').removeClass('active');
  $('#answer-toggle').addClass('right');
  refreshAnswerMode();
});

$('#play-word-btn').click(function() {
  if (currentQ) playAudio(wordAudioSrc(currentQ));
});

$(document).on('click', '.hint-play', function() {
  playAudio($(this).data('src'));
});

$('#show').click(function() {
  var isType = (answerMode === 'type') && (mode !== 'mean');
  if (isType) {
    var inp = $('#listen-input').val();
    if (inp.trim()) {
      var ok = checkAnswer(currentQ, inp);
      $('#listen-result').html(ok
        ? '<span class="result-correct">✓ 正確！</span>'
        : '<span class="result-wrong">✗ 毋著</span>');
    }
  }
  revealAnswer();
});

$('#next').click(function() { nextQuestion(); });

$('#back').click(function() {
  qi -= 2;
  nextQuestion();
  if (answerMode !== 'type') revealAnswer();
});

$('#listen-input').on('input', function() {
  $('#show').prop('disabled', $(this).val().trim() === '');
});
$('#listen-input').on('keydown', function(e) {
  if (e.key === 'Enter' && !$('#show').prop('disabled')) $('#show').click();
});

$('#star').click(function() {
  var no = currentQ ? currentQ.no : null;
  if (!no) return;
  var wasStarred = $(this).hasClass('starred');
  if (wasStarred) {
    setMarked(no, false);
    $(this).removeClass('starred');
    showToast('已從生份移除');
  } else {
    setMarked(no, true);
    $(this).addClass('starred');
    showToast('已加入生份的詞');
  }
});

var MARKS_KEY = 'taigi700_starred';

function isMarked(no) {
  var marks = localStorage.getItem(MARKS_KEY);
  return !!(marks && marks.match('&' + no + '&'));
}

function getMarks() {
  var marks = localStorage.getItem(MARKS_KEY);
  if (!marks || marks === '&') return null;
  return marks.replace(/^\&|\&$/g, '').split('&');
}

function setMarked(no, val) {
  var marks = localStorage.getItem(MARKS_KEY) || '';
  marks = marks.replace('&' + no + '&', '&').replace(/\&+/g, '&');
  if (val) marks = (marks && marks !== '&' ? marks : '&') + no + '&';
  localStorage.setItem(MARKS_KEY, marks);
}

startMode();

</script>
</body>
</html>
