<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="zh-tw" lang="zh-tw">
<head>
<title>教育部700建議用字練習</title>
<meta charset="utf-8">
<meta name="theme-color" content="#f0511d">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Iansui&family=Huninn&display=swap" rel="stylesheet">
<style>
/* ── Reset ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

body {
  background: #fcede8;
  font-family: 'Huninn', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
}

/* ── Header ─────────────────────────────────────────── */
#header {
  background: #1a1a1a;
  padding: 12px 12px 10px;
  padding-top: calc(12px + env(safe-area-inset-top));
  flex-shrink: 0;
}

#mode-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.mode-tab {
  flex: 1;
  font-family: 'Huninn', sans-serif;
  font-size: 14px;
  padding: 8px 2px;
  border: none;
  border-radius: 8px;
  background: #333;
  color: #888;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.mode-tab.active { background: #f0511d; color: #fff }

#mode-toggle {
  display: flex;
  gap: 0;
  background: #2e2e2e;
  border-radius: 20px;
  padding: 3px;
}
.toggle-btn {
  flex: 1;
  font-family: 'Huninn', sans-serif;
  font-size: 14px;
  padding: 5px 0;
  border: none;
  border-radius: 17px;
  background: transparent;
  color: #888;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.toggle-btn.active { background: #f0511d; color: #fff }

/* ── Main ────────────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 0;
  overflow-y: auto;
}

/* ── Card ────────────────────────────────────────────── */
#card {
  width: 100%;
  max-width: 480px;
  background: #fff9f7;
  border-radius: 18px;
  padding: 20px 20px 24px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

#no {
  font-size: 13px;
  color: #c0b0ab;
  align-self: flex-start;
}

/* 台語漢字 */
#word {
  font-family: 'Iansui', sans-serif;
  font-size: 64px;
  color: #521b0b;
  line-height: 1.2;
  text-align: center;
  border-radius: 12px;
  padding: 4px 16px;
  min-width: 160px;
  transition: color 0.2s, background 0.2s;
}

/* 播音按鈕 */
.play-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  background: #e8d4ce;
  color: #6b2a1a;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  cursor: pointer;
  font-family: 'Huninn', sans-serif;
  font-size: 14px;
  opacity: 0.9;
  transition: opacity 0.12s, background 0.12s;
}
.play-btn:hover { opacity: 1; background: #ddc4bc }
.play-btn svg { flex-shrink: 0 }

/* 台羅 */
#read {
  font-family: 'Iansui', sans-serif;
  color: #184178;
  text-align: center;
  border-radius: 12px;
  padding: 4px 16px;
  min-width: 160px;
  min-height: 60px;
  transition: color 0.2s, background 0.2s;
}
#read1 { font-size: 44px; line-height: 1.3 }
#read1 span { display: block }
#read2 { font-size: 22px; color: #4a6fa8; margin-top: 6px }
#read2 span { white-space: nowrap }

/* 華語解釋 */
#mean {
  font-family: 'Huninn', sans-serif;
  font-size: 28px;
  color: #333;
  text-align: center;
  border-radius: 12px;
  padding: 4px 16px;
  min-width: 120px;
  min-height: 44px;
  transition: color 0.2s, background 0.2s;
}
#mean span { white-space: nowrap }

/* ── 遮罩（不改變排版，只蓋住文字） ─────────────────────── */
.masked {
  color: transparent !important;
  background: #ddd !important;
  border-radius: 12px;
  user-select: none;
  pointer-events: none;
}
.masked * { color: transparent !important }
#read.masked { color: transparent !important }

/* ── 用例提示 ─────────────────────────────────────────── */
#hint-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

#showhint {
  font-family: 'Huninn', sans-serif;
  font-size: 15px;
  background: none;
  border: 1.5px solid #c0876e;
  color: #c0876e;
  border-radius: 8px;
  padding: 5px 16px;
  cursor: pointer;
}
#showhint:hover { background: #fdf0eb }

#hint {
  font-family: 'Iansui', sans-serif;
  font-size: 22px;
  color: #19451b;
  line-height: 2.2;
  text-align: center;
}
.hint-item { display: inline }
.blank { color: #ccc }
.hint-word { color: #c0392b; font-family: 'Iansui', sans-serif }
/* 頓號獨立，不在 button 前後 */
.hint-sep { margin: 0 2px }
.hint-play {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: #ddeedd;
  color: #19451b;
  border: none;
  border-radius: 8px;
  padding: 5px 11px;
  cursor: pointer;
  font-size: 12px;
  vertical-align: middle;
  margin: 0 2px;
  line-height: 1;
  opacity: 0.85;
}
.hint-play:hover { opacity: 1 }

/* ── 聽音打字區 ───────────────────────────────────────── */
#listen-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
#listen-prompt {
  font-size: 15px;
  color: #999;
}
#listen-input {
  font-family: 'Iansui', sans-serif;
  font-size: 30px;
  width: 90%;
  padding: 10px;
  border: 2px solid #c0876e;
  border-radius: 10px;
  text-align: center;
  background: #fff;
  outline: none;
}
#listen-input:focus { border-color: #f0511d }
#listen-input:disabled { background: #f5f5f5; color: #999 }
#listen-submit {
  font-family: 'Huninn', sans-serif;
  font-size: 22px;
  padding: 8px 32px;
  background: #f0511d;
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
#listen-submit:disabled { background: #ccc; cursor: default }
#listen-result {
  font-size: 36px;
  font-weight: bold;
  min-height: 48px;
}
.result-correct { color: #1a7a1a }
.result-wrong   { color: #cc1111 }

/* ── 底部操作列 ───────────────────────────────────────── */
#bottom-bar {
  position: sticky;
  bottom: 0;
  left: 0; right: 0;
  background: #fff;
  border-top: 1px solid #ead8d2;
  display: flex;
  align-items: center;
  padding: 12px 12px calc(28px + env(safe-area-inset-bottom));
  gap: 8px;
  flex-shrink: 0;
  margin-top: 16px;
}

#back {
  font-family: 'Huninn', sans-serif;
  font-size: 18px;
  background: #f0ebe9;
  border: none;
  border-radius: 10px;
  padding: 11px 14px;
  cursor: pointer;
  color: #666;
  flex-shrink: 0;
}
#back:hover { background: #e5dcd9 }

/* 星星按鈕 */
#star {
  font-size: 18px;
  background: #f0ebe9;
  border: none;
  border-radius: 10px;
  padding: 11px 14px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}
#star:hover { background: #e5dcd9 }
#star.starred { background: #fff3e0 }

#show {
  flex: 1;
  font-family: 'Huninn', sans-serif;
  font-size: 20px;
  padding: 11px;
  background: #f0511d;
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
#show:hover { background: #d9471a }

#next {
  flex: 1;
  font-family: 'Huninn', sans-serif;
  font-size: 20px;
  padding: 11px;
  background: #2a2a2a;
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
#next:hover { background: #111 }

/* ── Toast ───────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(0,0,0,0.78);
  color: #fff;
  font-family: 'Huninn', sans-serif;
  font-size: 15px;
  padding: 9px 20px;
  border-radius: 22px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) }

/* ── Utility ─────────────────────────────────────────── */
.hide { display: none !important }
</style>
</head>
<body>

<!-- ── Header ── -->
<div id="header">
  <div id="mode-tabs">
    <button class="mode-tab active" data-mode="word">漢字</button>
    <button class="mode-tab" data-mode="read">台羅</button>
    <button class="mode-tab" data-mode="mean">華語解釋</button>
    <button class="mode-tab" data-mode="listen">聽音打字</button>
  </div>
  <div id="mode-toggle">
    <button class="toggle-btn active" id="toggle-all">全部</button>
    <button class="toggle-btn" id="toggle-star">生份</button>
  </div>
</div>

<!-- ── Main ── -->
<div id="main">
  <div id="card">
    <span id="no"></span>

    <!-- 台語漢字 -->
    <span id="word"></span>

    <!-- 播音 -->
    <button id="play-word-btn" class="play-btn">
      <svg viewBox="0 0 10 13" width="10" height="13" fill="currentColor">
        <polygon points="0,0 10,6.5 0,13"/>
      </svg>
      播音
    </button>

    <!-- 台羅 -->
    <div id="read">
      <div id="read1"></div>
      <div id="read2"></div>
    </div>

    <!-- 華語解釋 -->
    <div id="mean"></div>

    <!-- 用例 -->
    <div id="hint-area">
      <button id="showhint">顯示用例提示</button>
      <div id="hint"></div>
    </div>

    <!-- 聽音打字 -->
    <div id="listen-area" class="hide">
      <p id="listen-prompt">請輸入你聽到的字（漢字或台語羅馬拼音）</p>
      <input id="listen-input" type="text" autocomplete="off" autocorrect="off"
             autocapitalize="none" spellcheck="false" placeholder="輸入答案…">
      <button id="listen-submit">確認</button>
      <div id="listen-result"></div>
    </div>
  </div>
</div>

<!-- ── Bottom bar ── -->
<div id="bottom-bar">
  <button id="back">⬅</button>
  <button id="star">⭐</button>
  <button id="show">對答案</button>
  <button id="next" class="hide">後一題</button>
</div>

<audio id="player"></audio>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="moe700.js"></script>
<script>

var ques = null;
var qi = null;
var mode = 'word';
var onlyStarred = false;
var currentQ = null;

var qindex = {};
for (var i in moe700) qindex[moe700[i].no + ''] = i;

// ── Audio ─────────────────────────────────────────────
var player = document.getElementById('player');

function playAudio(src) {
  player.src = src;
  player.play().catch(function() {});
}

function wordAudioSrc(q) {
  return 'audio/minnan700-' + q.no + '-' + q.word + '.mp3';
}

function sampleAudioSrc(q, rawItem) {
  return 'audio/minnan700-' + q.no + '-' + rawItem.replace(/～/g, q.word) + '.mp3';
}

// ── Answer check ─────────────────────────────────────
function normalizeRoman(str) {
  return str.trim().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/-/g, '').toLowerCase();
}

function checkListenAnswer(q, input) {
  if (input.trim() === q.word) return true;
  var norm = normalizeRoman(input);
  var reads = (q.read || []).concat(q.read2 || []);
  for (var i = 0; i < reads.length; i++) {
    if (normalizeRoman(reads[i]) === norm) return true;
  }
  return false;
}

// ── Rendering ────────────────────────────────────────
function playSvg() {
  return '<svg viewBox="0 0 10 13" width="9" height="11" fill="currentColor"><polygon points="0,0 10,6.5 0,13"/></svg>';
}

function toHintSpans(q) {
  var parts = q.sample.split(/、/);
  var res = '';
  for (var i = 0; i < parts.length; i++) {
    var src = sampleAudioSrc(q, parts[i]);
    var display = parts[i].replace(/～/g, '<span class="blank">＿</span>');
    // 播放鍵在詞後，頓號在播放鍵後
    res += '<span class="hint-item">'
         + '<span class="hint-text">' + display + '</span>'
         + '<button class="hint-play" data-src="' + src + '">' + playSvg() + '</button>'
         + (i < parts.length - 1 ? '<span class="hint-sep">、</span>' : '')
         + '</span>';
  }
  return res;
}

function revealHintWord(q) {
  $('#hint .blank').each(function() {
    $(this).replaceWith('<span class="hint-word">' + q.word + '</span>');
  });
}

// ── Toast ────────────────────────────────────────────
function showToast(msg) {
  var $t = $('<div class="toast">' + msg + '</div>');
  $('body').append($t);
  setTimeout(function() { $t.addClass('show'); }, 10);
  setTimeout(function() { $t.removeClass('show'); }, 2200);
  setTimeout(function() { $t.remove(); }, 2600);
}

// ── Mode helpers ─────────────────────────────────────
function applyMask() {
  // Clear all masks first
  $('#word, #read, #mean').removeClass('masked');

  if (mode === 'word')   $('#word').addClass('masked');
  if (mode === 'read')   $('#read').addClass('masked');
  if (mode === 'mean')   $('#mean').addClass('masked');
  if (mode === 'listen') $('#word, #read, #mean').addClass('masked');
}

function removeMasks() {
  $('#word, #read, #mean').removeClass('masked');
}

// ── Start / next ─────────────────────────────────────
function startMode() {
  ques = [];

  if (onlyStarred) {
    var marklist = getMarks();
    if (!marklist || marklist.length === 0) {
      showEmpty(); return;
    }
    for (var i in marklist) ques.push(moe700[qindex[marklist[i]]]);
  } else {
    for (var i in moe700) ques.push(moe700[i]);
  }

  for (var i = 0; i < ques.length; i++) {
    var j = Math.floor(Math.random() * ques.length);
    if (i === j) continue;
    var tmp = ques[i]; ques[i] = ques[j]; ques[j] = tmp;
  }
  qi = 0;
  nextQuestion();
}

function showEmpty() {
  $('#no').text('');
  $('#word').text('Bô mi̍h-kiānn').removeClass('masked');
  $('#read1').html('');
  $('#read2').html('');
  $('#read').addClass('masked');
  $('#mean').html('<span>尚未標記生份的詞。</span><span>作答時按 ⭐ 加入。</span>').removeClass('masked');
  $('#hint').html('');
  $('#showhint').addClass('hide');
  $('#listen-area').addClass('hide');
  $('#show').addClass('hide');
  $('#next').addClass('hide');
  $('#back').addClass('hide');
  currentQ = null;
}

function nextQuestion() {
  if (qi >= ques.length) { startMode(); return; }

  var q = ques[qi];
  currentQ = q;
  var isListen = (mode === 'listen');

  var reads1 = '';
  for (var r in q.read) reads1 += '<span>' + q.read[r] + '</span>';
  var reads2 = '';
  if (q.read2) for (var r in q.read2) reads2 += (r == 0 ? '' : ' / ') + '<span>' + q.read2[r] + '</span>';

  $('#no').text('No. ' + q.no);
  $('#word').text(q.word);
  $('#read1').html(reads1);
  $('#read2').html(reads2);
  $('#mean').html(q.mean.split(/、/).map(function(s){ return '<span>' + s + '</span>'; }).join('、'));
  $('#hint').html(toHintSpans(q)).addClass('hide');
  $('#showhint').removeClass('hide');

  // Apply masks (layout stays fixed)
  applyMask();

  // Listen area
  if (isListen) {
    $('#listen-area').removeClass('hide');
    $('#listen-result').html('');
    $('#listen-input').val('').prop('disabled', false);
    $('#listen-submit').prop('disabled', false);
    $('#show').text('跳過揭示');
    setTimeout(function() { playAudio(wordAudioSrc(q)); }, 200);
  } else {
    $('#listen-area').addClass('hide');
    $('#show').text('對答案');
  }

  // Star state
  $('#star').removeClass('starred').text('⭐');
  if (isMarked(q.no)) $('#star').addClass('starred').text('★');

  $('#show').removeClass('hide');
  $('#next').addClass('hide');
  if (qi >= 1) $('#back').removeClass('hide'); else $('#back').addClass('hide');

  qi++;
}

// ── Reveal answer ────────────────────────────────────
function revealAnswer() {
  removeMasks();
  $('#hint').removeClass('hide');
  $('#showhint').addClass('hide');
  $('#show').addClass('hide');
  $('#next').removeClass('hide');
  if (currentQ) revealHintWord(currentQ);
  if (mode === 'listen') {
    $('#listen-submit').prop('disabled', true);
    $('#listen-input').prop('disabled', true);
  }
}

// ── Events ───────────────────────────────────────────
$('.mode-tab').click(function() {
  $('.mode-tab').removeClass('active');
  $(this).addClass('active');
  mode = $(this).data('mode');
  startMode();
});

$('#toggle-all').click(function() {
  if (!onlyStarred) return;
  onlyStarred = false;
  $('#toggle-all').addClass('active');
  $('#toggle-star').removeClass('active');
  startMode();
});

$('#toggle-star').click(function() {
  if (onlyStarred) return;
  onlyStarred = true;
  $('#toggle-star').addClass('active');
  $('#toggle-all').removeClass('active');
  startMode();
});

$('#play-word-btn').click(function() {
  if (currentQ) playAudio(wordAudioSrc(currentQ));
});

$(document).on('click', '.hint-play', function() {
  playAudio($(this).data('src'));
});

$('#showhint').click(function() {
  $('#hint').removeClass('hide');
  $(this).addClass('hide');
});

$('#show').click(function() { revealAnswer(); });

$('#next').click(function() { nextQuestion(); });

$('#back').click(function() {
  qi -= 2;
  nextQuestion();
  if (mode !== 'listen') revealAnswer();
});

$('#listen-submit').click(function() {
  var inp = $('#listen-input').val();
  if (!inp.trim()) return;
  var ok = checkListenAnswer(currentQ, inp);
  $('#listen-result').html(ok
    ? '<span class="result-correct">✓ 正確！</span>'
    : '<span class="result-wrong">✗ 毋著</span>');
  revealAnswer();
});

$('#listen-input').on('keydown', function(e) {
  if (e.key === 'Enter') $('#listen-submit').click();
});

$('#star').click(function() {
  var no = currentQ ? currentQ.no : null;
  if (!no) return;
  var wasStarred = $(this).hasClass('starred');
  if (wasStarred) {
    setMarked(no, false);
    $(this).removeClass('starred').text('⭐');
  } else {
    setMarked(no, true);
    $(this).addClass('starred').text('★');
    showToast('已加入生份的詞 ⭐');
  }
});

// ── localStorage（星星跨模式共用） ────────────────────────
var MARKS_KEY = 'taigi700_starred';

function isMarked(no) {
  var marks = localStorage.getItem(MARKS_KEY);
  return !!(marks && marks.match('&' + no + '&'));
}

function getMarks() {
  var marks = localStorage.getItem(MARKS_KEY);
  if (!marks || marks === '&') return null;
  return marks.replace(/^\&|\&$/g, '').split('&');
}

function setMarked(no, val) {
  var marks = localStorage.getItem(MARKS_KEY) || '';
  marks = marks.replace('&' + no + '&', '&').replace(/\&+/g, '&');
  if (val) marks = (marks && marks !== '&' ? marks : '&') + no + '&';
  localStorage.setItem(MARKS_KEY, marks);
}

// ── Init ──────────────────────────────────────────────
startMode();

</script>
</body>
</html>
